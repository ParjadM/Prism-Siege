<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Prism Siege - 3D Tower Defense</title>
    <!-- Import Sci-Fi Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        html {
            overflow: hidden;
            height: 100%;
        }
        body, html {
            min-height: 100vh;
            min-height: 100dvh;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
            background-color: #0b0b12;
            font-family: 'Rajdhani', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* Animated Neon Grid Background */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(255, 102, 178, 0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 102, 178, 0.07) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -2;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) scale(3);
            animation: gridMove 15s linear infinite;
        }

        /* Glowing Ambient Orbs */
        body::after {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255,0,0,0.15) 0%, rgba(255,102,178,0.05) 40%, transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 40px; }
        }

        .hero {
            text-align: center;
            padding: 2rem 1.5rem;
            z-index: 1;
            max-width: 1000px;
            width: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            animation: fadeIn 1s ease-out;
        }
        .hero-head { margin-bottom: 0; }
        .hero-bottom { margin-top: auto; }
        .hero-foot {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 102, 178, 0.15);
            color: rgba(179, 179, 204, 0.6);
            font-size: 0.75rem;
            letter-spacing: 0.15em;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.85rem, 9vw, 4rem);
            font-weight: 900;
            margin: 0 0 0.35rem;
            background: linear-gradient(135deg, #ff66b2, #ff0000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .subtitle {
            color: rgba(179, 179, 204, 0.95);
            font-size: clamp(0.9rem, 2.2vw, 1.25rem);
            margin-bottom: 0;
            letter-spacing: 0.2em;
            font-weight: 500;
        }

        .play-buttons {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 0;
        }

        .btn-play {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ff66b2, #ff0000);
            color: white;
            text-decoration: none;
            padding: 0.65rem 1.5rem;
            min-height: 44px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 12px;
            border: 1px solid rgba(255, 102, 178, 0.4);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            box-shadow: 0 4px 16px rgba(255, 102, 178, 0.25);
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        .btn-play:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 102, 178, 0.4);
            border-color: rgba(255, 102, 178, 0.6);
        }

        .btn-play:active { transform: translateY(0); }
        .btn-label-short { display: none; }
        .btn-label-long { display: inline; }
        .btn-play-pvp { background: linear-gradient(135deg, #e60000, #b30033); border-color: rgba(255, 0, 0, 0.4); }
        .btn-play-pvp:hover { box-shadow: 0 8px 24px rgba(255, 0, 0, 0.35); }

        /* Feature cards */
        .features {
            display: flex;
            gap: 1rem;
            margin-top: 0;
            flex-wrap: wrap;
            justify-content: center;
            flex-shrink: 0;
        }

        .feature {
            position: relative;
            text-align: center;
            width: 200px;
            background: rgba(28, 28, 42, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 102, 178, 0.18);
            border-radius: 12px;
            padding: 1.25rem 1rem;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .feature::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 102, 178, 0.5), transparent);
            opacity: 0.6;
        }

        .feature:hover {
            border-color: rgba(255, 102, 178, 0.45);
            box-shadow: 0 8px 28px rgba(255, 102, 178, 0.15);
        }

        .feature span {
            font-size: 2rem;
            display: block;
            margin-bottom: 0.6rem;
        }

        .feature p {
            margin: 0;
            color: rgba(230, 230, 230, 0.95);
            font-size: 0.9rem;
            font-weight: 600;
            line-height: 1.35;
        }

        @media (max-width: 768px) {
            body, html { justify-content: flex-start; padding-top: max(0.75rem, env(safe-area-inset-top)); overflow-y: auto; }
            .hero {
                padding: 1rem 0.75rem 1.5rem;
                width: 100%;
                max-width: 100%;
                min-height: auto;
                justify-content: flex-start;
                gap: 0;
            }
            .hero-foot { margin-top: 1rem; padding-top: 0.75rem; font-size: 0.65rem; }
            .hero h1 {
                font-size: 1.6rem;
                letter-spacing: 0.06em;
                margin-bottom: 0.2rem;
            }
            .hero .subtitle {
                font-size: 0.8rem;
                margin-bottom: 1rem;
                letter-spacing: 0.15em;
            }
            .play-buttons {
                flex-direction: row;
                gap: 0.5rem;
                margin-bottom: 1rem;
                width: 100%;
                max-width: 100%;
            }
            .hero .btn-play {
                flex: 1;
                min-width: 0;
                padding: 0.6rem 0.5rem;
                font-size: 0.75rem;
                letter-spacing: 0.08em;
                min-height: 42px;
            }
            .btn-label-long { display: none; }
            .btn-label-short { display: inline; }
            .features {
                margin-top: 1rem;
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 0.5rem;
                width: 100%;
                max-width: 100%;
            }
            .feature {
                width: 100%;
                min-width: 0;
                padding: 0.65rem 0.4rem;
            }
            .feature::before { opacity: 0.5; }
            .feature span { font-size: 1.4rem; margin-bottom: 0.25rem; }
            .feature p { font-size: 0.6rem; line-height: 1.25; }
        }
        @media (max-width: 480px) {
            .hero { padding: 0.75rem 0.6rem 1.25rem; }
            .hero h1 { font-size: 1.4rem; }
            .hero .subtitle { font-size: 0.72rem; margin-bottom: 0.85rem; }
            .play-buttons { margin-bottom: 0.85rem; gap: 0.4rem; }
            .hero .btn-play { font-size: 0.7rem; padding: 0.55rem 0.4rem; min-height: 40px; }
            .features { margin-top: 0.85rem; gap: 0.4rem; }
            .feature { padding: 0.5rem 0.35rem; }
            .feature span { font-size: 1.2rem; }
            .feature p { font-size: 0.55rem; }
            .btn-settings { top: max(8px, env(safe-area-inset-top)); right: max(8px, env(safe-area-inset-right)); width: 42px; height: 42px; font-size: 1.1rem; }
            .settings-panel { margin: max(12px, env(safe-area-inset-top)); max-width: calc(100vw - 2rem); }
        }

        /* Settings button */
        .btn-settings {
            position: fixed; top: max(12px, env(safe-area-inset-top)); right: max(12px, env(safe-area-inset-right));
            width: 48px; height: 48px;
            background: rgba(30, 30, 45, 0.6);
            border: 1px solid rgba(255, 102, 178, 0.4);
            border-radius: 50%;
            color: #ff66b2; font-size: 1.4rem;
            cursor: pointer; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease;
        }
        .btn-settings:hover {
            background: rgba(255, 102, 178, 0.2);
            box-shadow: 0 0 20px rgba(255, 102, 178, 0.4);
        }

        /* Settings panel overlay */
        .settings-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center;
            z-index: 200;
        }
        .settings-overlay.active { display: flex; }
        .settings-panel {
            background: rgba(25, 25, 40, 0.95);
            border: 1px solid rgba(255, 102, 178, 0.3);
            border-radius: 16px; padding: 2rem 2.5rem;
            max-width: 380px; width: 90%;
        }
        .settings-panel h2 {
            font-family: 'Orbitron', sans-serif;
            color: #ff66b2; margin-bottom: 1.5rem;
            font-size: 1.2rem; letter-spacing: 2px;
        }
        .settings-row { margin-bottom: 1rem; }
        .settings-row label { display: block; color: #b3b3cc; font-size: 0.9rem; margin-bottom: 0.6rem; }
        .settings-btns {
            display: flex; gap: 10px;
        }
        .settings-btns button {
            flex: 1; padding: 12px; font-family: 'Rajdhani', sans-serif; font-weight: 600;
            background: rgba(40,40,60,0.8); border: 1px solid rgba(255,102,178,0.3);
            color: #e6e6e6; border-radius: 8px; cursor: pointer;
            transition: all 0.2s ease;
        }
        .settings-btns button:hover { border-color: #ff66b2; background: rgba(255,102,178,0.15); }
        .settings-btns button.active {
            background: rgba(255, 102, 178, 0.3);
            border-color: #ff66b2;
            color: white;
        }
    </style>
</head>
<body>
    <button class="btn-settings" id="btn-settings" title="Settings">⚙</button>
    <div class="settings-overlay" id="settings-overlay">
        <div class="settings-panel">
            <h2>Settings</h2>
            <div class="settings-row">
                <label>AI difficulty</label>
                <div class="settings-btns" id="ai-difficulty">
                    <button data-value="easy">Easy</button>
                    <button data-value="medium" class="active">Medium</button>
                    <button data-value="hard">Hard</button>
                </div>
            </div>
        </div>
    </div>
    <div class="hero">
        <div class="hero-head">
            <h1>Prism Siege</h1>
            <p class="subtitle">3D TOWER DEFENSE</p>
        </div>
        <div class="play-buttons">
            <a href="game-engine.html" id="link-vs-ai" class="btn-play"><span class="btn-label-long">Play vs AI</span><span class="btn-label-short">Vs AI</span></a>
            <a href="lobby.html" id="link-vs-player" class="btn-play btn-play-pvp"><span class="btn-label-long">Play vs Player</span><span class="btn-label-short">Vs Player</span></a>
        </div>
        
        <div class="hero-bottom">
        <div class="features">
            <div class="feature">
                <span>🛡️</span>
                <p>Construct Grid Defenses</p>
            </div>
            <div class="feature">
                <span>⚔️</span>
                <p>Command 3-Lane Assaults</p>
            </div>
            <div class="feature">
                <span>🤖</span>
                <p>Outsmart Adaptive AI</p>
            </div>
        </div>
        <p class="hero-foot">Build · Defend · Conquer</p>
        </div>
    </div>
    <script>
        const STORAGE_KEY = 'prismSiege_aiDifficulty';
        const overlay = document.getElementById('settings-overlay');
        const aiBtns = document.getElementById('ai-difficulty').querySelectorAll('button');
        const linkVsAi = document.getElementById('link-vs-ai');

        function getDifficulty() { return localStorage.getItem(STORAGE_KEY) || 'medium'; }
        function setDifficulty(v) {
            localStorage.setItem(STORAGE_KEY, v);
            aiBtns.forEach(b => { b.classList.toggle('active', b.dataset.value === v); });
            linkVsAi.href = 'game-engine.html?ai=' + v;
        }

        document.getElementById('btn-settings').addEventListener('click', () => overlay.classList.add('active'));
        overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('active'); });
        aiBtns.forEach(b => b.addEventListener('click', () => setDifficulty(b.dataset.value)));

        setDifficulty(getDifficulty());
        document.getElementById('link-vs-player').style.boxShadow = '0 4px 16px rgba(255,0,0,0.25)';
    </script>
</body>
</html>
