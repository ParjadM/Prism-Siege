<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Prism Siege - 3D Tower Defense</title>
    <!-- Import Sci-Fi Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <style>
        .hero {
            text-align: center; padding: 2rem 1.5rem; z-index: 1;
            max-width: 1000px; width: 100%; min-height: 100vh; min-height: 100dvh;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .hero-head { margin-bottom: 0; }
        .hero-bottom { margin-top: auto; }
        .hero-foot {
            margin-top: 1.5rem; padding-top: 1rem;
            border-top: 1px solid var(--glass-border);
            color: var(--text-muted); font-size: 0.75rem; letter-spacing: 0.15em;
        }

        h1 { font-size: clamp(2.5rem, 10vw, 5rem); font-weight: 900; margin: 0 0 0.5rem; }
        .subtitle { color: var(--text-muted); font-size: clamp(1rem, 2.5vw, 1.5rem); letter-spacing: 0.3em; font-weight: 600; text-transform: uppercase; }

        .play-buttons { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-bottom: 2rem; }

        .btn-label-short { display: none; }
        .btn-label-long { display: inline; }

        .features { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; flex-shrink: 0; }
        .feature {
            text-align: center; width: 220px; padding: 2rem 1.5rem;
            position: relative; overflow: hidden;
        }
        .feature::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-glow), transparent); opacity: 0.8;
        }
        .feature span { font-size: 2.5rem; display: block; margin-bottom: 1rem; filter: drop-shadow(0 0 10px var(--primary-glow)); }
        .feature p { margin: 0; color: white; font-size: 1rem; font-weight: 700; letter-spacing: 0.05em; }

        /* Settings CSS */
        .btn-settings {
            position: fixed; top: max(16px, env(safe-area-inset-top)); right: max(16px, env(safe-area-inset-right));
            width: 50px; height: 50px; border-radius: 50%;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            color: var(--primary-color); font-size: 1.5rem; cursor: pointer; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(8px); transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .btn-settings:hover { background: rgba(255, 51, 133, 0.2); box-shadow: 0 0 20px var(--primary-glow); transform: rotate(45deg); }

        .settings-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center; z-index: 200;
        }
        .settings-overlay.active { display: flex; animation: fadeIn 0.3s ease; }
        .settings-panel { padding: 2.5rem; max-width: 400px; width: 90%; }
        .settings-panel h2 { color: var(--primary-color); margin-bottom: 1.5rem; font-size: 1.5rem; letter-spacing: 3px; text-shadow: 0 0 10px var(--primary-glow); text-align: center; }
        .settings-row { margin-bottom: 1.5rem; }
        .settings-row label { display: block; color: var(--text-muted); font-size: 1rem; margin-bottom: 0.8rem; text-transform: uppercase; letter-spacing: 1px; text-align: center; }
        .settings-btns { display: flex; gap: 10px; }
        .settings-btns button { flex: 1; padding: 12px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 768px) {
            body, html { justify-content: flex-start; padding-top: max(1rem, env(safe-area-inset-top)); overflow-y: auto; }
            .hero { padding: 1rem 1rem 2rem; justify-content: flex-start; gap: 2rem; }
            .hero-foot { margin-top: 2rem; }
            h1 { font-size: 2.5rem; }
            .subtitle { font-size: 0.9rem; }
            .play-buttons { flex-direction: column; gap: 1rem; width: 100%; max-width: 300px; margin: 0 auto 2rem; }
            .btn-label-long { display: inline; }
            .btn-label-short { display: none; }
            .features { flex-direction: column; align-items: center; gap: 1rem; width: 100%; }
            .feature { width: 100%; max-width: 300px; padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="bg-grid"></div>
    <button class="btn-settings" id="btn-settings" title="Settings">⚙</button>
    <div class="settings-overlay" id="settings-overlay">
        <div class="settings-panel glass-panel">
            <h2>Settings</h2>
            <div class="settings-row">
                <label>AI difficulty</label>
                <div class="settings-btns" id="ai-difficulty">
                    <button data-value="easy" class="btn-glass">Easy</button>
                    <button data-value="medium" class="btn-glass active">Medium</button>
                    <button data-value="hard" class="btn-glass">Hard</button>
                </div>
            </div>
        </div>
    </div>
    <div class="hero">
        <div class="hero-head animate-in">
            <h1 class="text-gradient text-glow">Prism Siege</h1>
            <p class="subtitle">3D TOWER DEFENSE</p>
        </div>
        <div class="play-buttons animate-in delay-1">
            <a href="game-engine.html" id="link-vs-ai" class="btn-premium"><span class="btn-label-long">Play vs AI</span><span class="btn-label-short">Vs AI</span></a>
            <a href="lobby.html" id="link-vs-player" class="btn-premium alt"><span class="btn-label-long">Play vs Player</span><span class="btn-label-short">Vs Player</span></a>
        </div>
        
        <div class="hero-bottom animate-in delay-2">
            <div class="features">
                <div class="feature glass-panel">
                    <span>🛡️</span>
                    <p>Construct Grid Defenses</p>
                </div>
                <div class="feature glass-panel">
                    <span>⚔️</span>
                    <p>Command 3-Lane Assaults</p>
                </div>
                <div class="feature glass-panel">
                    <span>🤖</span>
                    <p>Outsmart Adaptive AI</p>
                </div>
            </div>
            <p class="hero-foot">Build · Defend · Conquer</p>
        </div>
    </div>
    <script>
        const STORAGE_KEY = 'prismSiege_aiDifficulty';
        const overlay = document.getElementById('settings-overlay');
        const aiBtns = document.getElementById('ai-difficulty').querySelectorAll('button');
        const linkVsAi = document.getElementById('link-vs-ai');

        function getDifficulty() { return localStorage.getItem(STORAGE_KEY) || 'medium'; }
        function setDifficulty(v) {
            localStorage.setItem(STORAGE_KEY, v);
            aiBtns.forEach(b => { b.classList.toggle('active', b.dataset.value === v); });
            linkVsAi.href = 'game-engine.html?ai=' + v;
        }

        document.getElementById('btn-settings').addEventListener('click', () => overlay.classList.add('active'));
        overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('active'); });
        aiBtns.forEach(b => b.addEventListener('click', () => setDifficulty(b.dataset.value)));

        setDifficulty(getDifficulty());
        document.getElementById('link-vs-player').style.boxShadow = '0 4px 16px rgba(255,0,0,0.25)';
    </script>
</body>
</html>
