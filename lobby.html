<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Prism Siege - PvP Lobby</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .lobby-box {
            text-align: center;
            max-width: 480px;
            padding: 3rem 2.5rem;
            width: 100%;
            animation: fadeIn 0.5s ease-out;
        }
        h1 { margin-bottom: 0.5rem; text-shadow: 0 0 15px var(--primary-glow); }
        .lobby-sub { color: var(--text-muted); font-size: 1.1rem; margin-bottom: 2.5rem; letter-spacing: 1px; }
        
        .section { margin-bottom: 2rem; position: relative; }
        .section-title { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.8rem; text-transform: uppercase; letter-spacing: 2px; }
        
        input[type="text"] {
            padding: 12px 20px;
            height: 48px;
            width: 100%;
            max-width: 200px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.4);
            color: white;
            font-size: 1.1rem;
            letter-spacing: 2px;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
            font-family: var(--font-heading);
        }
        input[type="text"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 15px var(--primary-glow), inset 0 2px 5px rgba(0,0,0,0.5);
        }
        
        .row { display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap; }
        .status { color: var(--text-muted); font-size: 0.9rem; margin-top: 1.5rem; height: 1.2rem; }
        
        .waiting-list {
            text-align: left;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--glass-border);
        }
        .waiting-list h3 { color: var(--primary-color); font-size: 1.1rem; margin-bottom: 1rem; text-align: center; }
        
        .player-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            margin-bottom: 8px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }
        .player-row:hover {
            border-color: var(--glass-border);
            background: rgba(255, 51, 133, 0.05);
        }
        .player-row .name { font-weight: 600; color: white; display: flex; align-items: center; gap: 8px; }
        .player-row .name::before {
            content: ''; display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #00ffcc; box-shadow: 0 0 8px #00ffcc;
        }
        
        .waiting-list-empty { color: #666; font-size: 0.9rem; padding: 1rem 0; text-align: center; font-style: italic; }
        
        .back-link {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            left: max(20px, env(safe-area-inset-left));
            z-index: 10;
        }
        
        #searching, #waiting { display: none; }
        #searching p:first-of-type { color: #ffcc00; margin-bottom: 0.5rem; font-size: 1.2rem; text-shadow: 0 0 10px rgba(255, 204, 0, 0.5); }
        #waiting .code { font-size: 2.5rem; font-weight: bold; letter-spacing: 8px; color: white; margin: 1rem 0 1.5rem; text-shadow: 0 0 20px var(--primary-glow); font-family: var(--font-heading); }

        @media (max-width: 480px) {
            .lobby-box { padding: 2rem 1.5rem; margin: 0 1rem; border-radius: 16px; }
            h1 { font-size: 2rem; }
            .row { flex-direction: column; width: 100%; }
            input[type="text"] { max-width: 100%; }
            .player-row { flex-direction: column; gap: 10px; text-align: center; }
            .btn-glass { width: 100%; }
            .back-link { top: max(10px, env(safe-area-inset-top)); left: max(10px, env(safe-area-inset-left)); padding: 0.4rem 1rem; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="bg-grid"></div>
    <a href="index.html" class="back-link btn-glass">← Menu</a>
    
    <div class="lobby-box glass-panel">
        <h1 class="text-gradient">PvP Lobby</h1>
        <p class="lobby-sub">Find an opponent or play with a friend</p>

        <div id="main-options">
            <div class="section">
                <button class="btn-premium" id="btn-find-match" style="width: 100%;">Find Match</button>
                <p class="section-title" style="margin-top: 10px;">Match with a random player</p>
            </div>
            
            <div class="waiting-list">
                <h3>Players seeking game</h3>
                <div id="waiting-list-container">
                    <p class="waiting-list-empty" id="waiting-list-empty">No one waiting. Click Find Match to appear here.</p>
                    <div id="waiting-list-rows"></div>
                </div>
            </div>
            
            <div class="section" style="border-top: 1px solid var(--glass-border); padding-top: 1.5rem;">
                <p class="section-title">Play with a friend</p>
                <div class="row" style="margin-bottom: 12px;">
                    <button class="btn-glass" id="btn-create-room" style="width: 100%;">Create Private Room</button>
                </div>
                <div class="row">
                    <input type="text" id="room-code-input" placeholder="Room code" maxlength="8">
                    <button class="btn-glass active" id="btn-join-room" style="flex: 1; padding: 12px;">Join</button>
                </div>
            </div>
        </div>

        <div id="searching" class="animate-in">
            <p>Searching for opponent...</p>
            <p id="queue-info" class="section-title"></p>
            <button class="btn-glass" id="btn-cancel-match" style="margin-top: 1rem;">Cancel</button>
        </div>

        <div id="waiting" class="animate-in">
            <p class="section-title">Share this code:</p>
            <p id="room-code-display" class="code"></p>
            <p class="section-title">Waiting for opponent...</p>
            <button class="btn-glass" id="btn-cancel-waiting" style="margin-top: 1rem;">Cancel</button>
        </div>

        <p id="status" class="status"></p>
    </div>

    <script>
        function getWsUrl() {
            if (window.PRISM_SIEGE_WS_URL) return window.PRISM_SIEGE_WS_URL;
            var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            var host = location.host || 'localhost:8080';
            return proto + '//' + host.replace(/\/$/, '') + '/ws';
        }

        var ws = null;
        var roomId = null;
        var playerIdx = null;
        var myClientId = null;

        function showMain() {
            document.getElementById('main-options').style.display = 'block';
            document.getElementById('searching').style.display = 'none';
            document.getElementById('waiting').style.display = 'none';
        }
        function showSearching() {
            document.getElementById('main-options').style.display = 'none';
            document.getElementById('searching').style.display = 'block';
            document.getElementById('waiting').style.display = 'none';
        }
        function showWaiting() {
            document.getElementById('main-options').style.display = 'none';
            document.getElementById('searching').style.display = 'none';
            document.getElementById('waiting').style.display = 'block';
        }
        function goToGame() {
            if (roomId != null && playerIdx != null)
                location.href = 'game-engine.html?mode=pvp&room_id=' + encodeURIComponent(roomId) + '&player_idx=' + playerIdx;
        }

        function connect() {
            ws = new WebSocket(getWsUrl());
            ws.onopen = function() { document.getElementById('status').textContent = 'Connected'; };
            ws.onclose = function() { document.getElementById('status').textContent = 'Disconnected'; };
            ws.onmessage = function(e) {
                try {
                    var msg = JSON.parse(e.data);
                    if (msg.event === 'joined') {
                        roomId = msg.room_id;
                        playerIdx = msg.player_idx;
                        if (msg.ready) {
                            goToGame();
                            return;
                        }
                        document.getElementById('room-code-display').textContent = (msg.room_id || '').toUpperCase();
                        showWaiting();
                    } else if (msg.event === 'opponent_joined') {
                        goToGame();
                    } else if (msg.event === 'matchmaking') {
                        if (msg.status === 'searching') {
                            showSearching();
                            document.getElementById('queue-info').textContent = (msg.queue_size || 0) >= 2 ? 'Match found!' : 'Players in queue: ' + (msg.queue_size || 0);
                        } else if (msg.status === 'cancelled') {
                            showMain();
                            document.getElementById('status').textContent = 'Cancelled';
                        }
                    } else if (msg.event === 'identity') {
                        myClientId = (msg.client_id || '').toLowerCase();
                    } else if (msg.event === 'waiting_list') {
                        renderWaitingList(msg.players || []);
                    } else if (msg.event === 'error') {
                        document.getElementById('status').textContent = msg.msg || 'Error';
                    }
                } catch (err) {}
            };
        }

        function renderWaitingList(players) {
            var emptyEl = document.getElementById('waiting-list-empty');
            var rowsEl = document.getElementById('waiting-list-rows');
            rowsEl.innerHTML = '';
            if (players.length === 0) {
                emptyEl.style.display = 'block';
                return;
            }
            emptyEl.style.display = 'none';
            players.forEach(function(p) {
                var id = (p.id || '').toLowerCase();
                var isSelf = myClientId && id === myClientId;
                var name = p.name || ('Player ' + (id || '').substring(0, 6).toUpperCase());
                if (isSelf) name = name + ' (you)';
                var row = document.createElement('div');
                row.className = 'player-row';
                row.innerHTML = '<span class="name">' + name + '</span>' +
                    (isSelf ? '<span class="section-title" style="margin-bottom:0;">Waiting...</span>' : '<button type="button" class="btn-glass active btn-challenge" data-id="' + (p.id || '') + '">Challenge</button>');
                if (!isSelf) {
                    row.querySelector('.btn-challenge').onclick = function() {
                        var targetId = this.getAttribute('data-id');
                        if (ws && ws.readyState === 1 && targetId) {
                            document.getElementById('status').textContent = '';
                            ws.send(JSON.stringify({ cmd: 'challenge', target_id: targetId }));
                        }
                    };
                }
                rowsEl.appendChild(row);
            });
        }

        document.getElementById('btn-find-match').onclick = function() {
            if (!ws || ws.readyState !== 1) return;
            document.getElementById('status').textContent = '';
            ws.send(JSON.stringify({ cmd: 'find_match' }));
        };
        document.getElementById('btn-cancel-match').onclick = function() {
            if (ws && ws.readyState === 1) ws.send(JSON.stringify({ cmd: 'cancel_match' }));
            showMain();
        };
        document.getElementById('btn-create-room').onclick = function() {
            if (!ws || ws.readyState !== 1) return;
            document.getElementById('status').textContent = '';
            ws.send(JSON.stringify({ cmd: 'create' }));
        };
        document.getElementById('btn-join-room').onclick = function() {
            var code = (document.getElementById('room-code-input').value || '').trim().toLowerCase();
            if (!code || !ws || ws.readyState !== 1) return;
            document.getElementById('status').textContent = '';
            ws.send(JSON.stringify({ cmd: 'join', room_id: code }));
        };
        document.getElementById('btn-cancel-waiting').onclick = function() { location.reload(); };

        connect();
    </script>
</body>
</html>
